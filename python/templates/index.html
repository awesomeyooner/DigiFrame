<!DOCTYPE html>

<html>
    <head>
        <title>My Web Page</title>
    </head>

    <style>
        label{
            font-size: 40px;
        }
        input[type="file"] {
            width: 500px;
            height: 500px;

            font-size: 40px;

            background-color: lightblue;

            border-radius: 50px;
            border-color: black;
            border: 100px;
        }
        input[type="file"]::file-selector-button {
            width: 500px;
            height: 500px;

            font-size: 40px;

            background-color: lightblue;

            border-radius: 50px;
            border-color: black;
            border: 100px;
        }
        button{
            width: 500px;
            height: 500px;

            font-size: 40px;

            background-color: lightcoral;

            border-radius: 50px;
            border-color: black;
            border: 100px;
        }
        img{
            width: 50%;
            height: auto;
        }

        .color-box {
            width: 40px;
            height: 40px;
            display: inline-block;
            background-color: #ccc;
            position: absolute;
            padding-left: 20px;
            padding-top: 20px;
        }

        .status {
            padding-top: 20px;
        }

        .feature {
            padding-top: 20px;
            padding-bottom: 20px;
        }
    </style>

    <body>

        <div class="feature">
            <h1>Hello World!</h1>
            <p>This is a simple HTML page served by Python Flask</p>
        </div>

        <div class="feature">
            <form>
                <label for="messageInput">Message (Optional)</label>
                <input type="text" id="messageInput" name="messageInput">

                </br>
                <label for="imageUpload">Upload an image (JPEG or PNG):</label>
                </br>
                <input type="file" id="fileSelector" name="fileSelector" accept=".jpeg, .jpg, .png">

                <button type="button" id="buttonSubmit" name="buttonSubmit">SEND!</button>
            </form>
        </div>

        <div class="feature">
            <div class="status">
                <label id="labelDownloadStatus">Download Status: </label> 
                <div id="colorboxDownloadStatus" class="color-box" style="background-color: blue"></div>
            </div>

            <div class="status">
                <label id="labelMessageStatus">Message Status: </label> 
                <div id="colorboxMessageStatus" class="color-box" style="background-color: blue"></div>
            </div>

            <div class="status">
                <label id="labelConnectionStatus">Connection Status: </label> 
                <div id="colorboxConnectionStatus" class="color-box" style="background-color: blue"></div>
            </div>
        </div>

        </br>

        <div>
            <label id="labelImage">No Image Selected!</label> 
            </br>
            <img id="image" src="#">
        </div>
    </body>

    <script>
        // Display Preview Image
        document.getElementById("fileSelector").addEventListener('change', async (event) => {
            
            setColorBox("colorboxDownloadStatus", "red");
        
            const selectedFile = document.getElementById("fileSelector").files[0];
                const fileName = selectedFile.name;
                const fileType = selectedFile.type;

            setLabel("labelImage", fileName);
            
            const reader = new FileReader();
            reader.onload = function(event){
                document.getElementById("image").src = event.target.result;
                document.getElementById("image").style.display = 'block';
            };
            reader.readAsDataURL(selectedFile);
        });

        // Send Image over HTTP
        document.getElementById("buttonSubmit").addEventListener('click', async (event) => {

            await sendImage();
            await sendMessage();
        });

        async function sendMessage(){
            // Get the message
            const msg = document.getElementById("messageInput").value;

            setColorBox("colorboxMessageStatus", "yellow");

            const response = await fetch('/message', {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: msg
                })
            });

            // Clear the textbox
            document.getElementById("messageInput").value = "";
            
            if(response.ok)
                setColorBox("colorboxMessageStatus", "green");
            else
                setColorBox("colorboxMessageStatus", "red");

            return response.ok;
        }

        async function sendImage(){
            // Turn status box yellow to indicate pending
            document.getElementById("colorboxDownloadStatus").style = "background-color: yellow";
            
            // Get the selected file
            const selectedFile = document.getElementById("fileSelector").files[0];
                const fileName = selectedFile.name;
                const fileType = selectedFile.type;

            const formData = new FormData();

            formData.append("file", selectedFile);

            // Send over HTTP
            const response = await fetch('/upload', {
                method: "POST",
                body: formData
            });

            // If OK, make status green
            if(response.ok)
                document.getElementById("colorboxDownloadStatus").style = "background-color: green";
            // If not OK, make status red
            else
                document.getElementById("colorboxDownloadStatus").style = "background-color: red";

            return response.ok
        }

        async function update(){
            const response = await fetch('/alive', {
                method: "GET",
            });

            if(response.ok){
                document.getElementById("colorboxConnectionStatus").style = "background-color: green";
            }
            else
                document.getElementById("colorboxConnectionStatus").style = "background-color: red";
        }

        function setLabel(id, text){
            document.getElementById(id).innerHTML = text;
        }

        function setColorBox(id, color){
            document.getElementById(id).style = "background-color: " + color;
        }

        // Update every second
        window.setInterval(update, 1000);
    </script>
</html>
